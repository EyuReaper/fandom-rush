services:
  postgres:
    image: postgres:16-alpine
    security_opt:
      - label=disable
    environment:
      POSTGRES_USER: postgres
      POSTGRES_DB: fandom_rush
      POSTGRES_PASSWORD: fandom_rush_pass
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./server/full_schema.sql:/docker-entrypoint-initdb.d/01-schema.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 10

  server:
    build: ./server
    security_opt:
      - label=disable
    ports:
      - "3000:3000"
    env_file: ./server/.env
    environment:
      DATABASE_URL: postgresql://postgres:fandom_rush_pass@postgres:5432/fandom_rush
      BETTER_AUTH_SECRET: ${BETTER_AUTH_SECRET:-dev-secret-change-in-prod}
      BETTER_AUTH_URL: http://localhost:3000
      CORS_ORIGIN: http://localhost:5173
      FRONTEND_URL: http://localhost:5173
    volumes:
      - ./server/src:/app/src
      - /app/node_modules
    depends_on:
      postgres:
        condition: service_healthy

  frontend:
    build:
      context: .
      target: dev
    security_opt:
      - label=disable
    ports:
      - "5173:5173"
    environment:
      VITE_API_URL: http://localhost:3000
    volumes:
      - ./src:/app/src
      - ./public:/app/public
      - ./index.html:/app/index.html
      - ./vite.config.ts:/app/vite.config.ts
      - ./tsconfig.json:/app/tsconfig.json
      - ./tsconfig.app.json:/app/tsconfig.app.json
      - ./tsconfig.node.json:/app/tsconfig.node.json
      - ./eslint.config.js:/app/eslint.config.js
      - /app/node_modules
    depends_on:
      - server

volumes:
  postgres_data:
